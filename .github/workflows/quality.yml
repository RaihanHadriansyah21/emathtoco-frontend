name: Frontend quality

on:
  pull_request:
  push:
    branches:
      - main
      - hardening-vps-readiness

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://lgdzanagxehzepcohvpx.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder_value
      NEXT_PUBLIC_API_URL: https://api.203-0-113-10.sslip.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npm run lint -- --max-warnings=0
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
